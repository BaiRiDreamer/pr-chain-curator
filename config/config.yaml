github:
  tokens:
    - ${GITHUB_TOKEN}
  rate_limit_delay: 0.5
  max_workers: 20
  request_timeout: 30
  max_retries: 4
  retry_backoff: 2
  max_retry_wait: 120

llm:
  provider: azure  # anthropic, openai, or azure
  api_key: apikey
  model: gpt-5.4-2026-03-05
  max_tokens: 2048
  request_timeout: 60
  max_retries: 3
  retry_backoff: 3
  max_retry_wait: 120

  # Azure OpenAI specific
  api_version: "2024-02-01"
  azure_endpoint: http
  default_headers:
    X-TT-LOGID: pr-chain-curator

filtering:
  chain_workers: 4
  min_chain_length: 2
  max_chain_length: 10
  max_time_span_days: 1095
  score_threshold: 7.0
  confidence_threshold: 0.7

cache:
  enabled: true
  dir: data/cache
